services:
  db:
    image: postgres:15-alpine
    container_name: gorentals-db
    environment:
      POSTGRES_DB: gorentals
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gorentals"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./GORENTALS
      dockerfile: Dockerfile
    container_name: gorentals-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://db:5432/gorentals
      DB_USERNAME: postgres
      DB_PASSWORD: password
      JWT_SECRET: ${JWT_SECRET:-demo_secret_for_local_parity_32_chars_long}
      FRONTEND_URL: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./gorentals-frontend
      dockerfile: Dockerfile
    container_name: gorentals-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
    depends_on:
      - backend

volumes:
  pgdata:
