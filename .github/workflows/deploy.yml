name: Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * *"

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compile backend
        working-directory: ./GORENTALS
        run: |
          chmod +x mvnw
          ./mvnw clean compile -B

      - name: Run fast backend tests (H2)
        working-directory: ./GORENTALS
        run: ./mvnw test -B -Dspring.profiles.active=test -Dtestcontainers.enabled=false

  backend-integration:
    runs-on: ubuntu-latest
    needs: [backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run PostgreSQL integration tests
        working-directory: ./GORENTALS
        run: |
          chmod +x mvnw
          ./mvnw test -B -Dspring.profiles.active=test -Dtestcontainers.enabled=true

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './gorentals-frontend/package-lock.json'

      - name: Install dependencies
        working-directory: ./gorentals-frontend
        run: npm install --legacy-peer-deps

      - name: TypeScript check
        working-directory: ./gorentals-frontend
        run: npx tsc --noEmit

      - name: Build frontend
        working-directory: ./gorentals-frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:8080/api' }}

  docker:
    runs-on: ubuntu-latest
    needs: [backend, backend-integration, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Configuration
        run: |
          [ -n "${{ secrets.DB_URL }}" ] || (echo "Missing DB_URL" && exit 1)
          [ -n "${{ secrets.JWT_SECRET }}" ] || (echo "Missing JWT_SECRET" && exit 1)
          [ -n "${{ secrets.RAZORPAY_KEY_ID }}" ] || (echo "Missing RAZORPAY_KEY_ID" && exit 1)
          [ -n "${{ secrets.NEXT_PUBLIC_API_URL }}" ] || (echo "Missing NEXT_PUBLIC_API_URL" && exit 1)

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./GORENTALS
          push: false
          tags: gorentals-backend:${{ github.sha }}

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./gorentals-frontend
          push: false
          tags: gorentals-frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}

  deploy:
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render Deploy (Backend)
        run: |
          [ -n "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}" ] && curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}" || echo "Backend hook missing"

      - name: Trigger Render Deploy (Frontend)
        run: |
          [ -n "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}" ] && curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}" || echo "Frontend hook missing"
