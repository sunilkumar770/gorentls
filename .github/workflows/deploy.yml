name: Build, Test & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Stage 1: Backend Validation ─────────────────────────
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up Docker
        uses: docker/setup-docker-action@v4

      - name: Compile backend
        working-directory: ./GORENTALS
        run: |
          chmod +x mvnw
          ./mvnw clean compile -B

      - name: Run backend tests
        working-directory: ./GORENTALS
        run: ./mvnw test -B -Dspring.profiles.active=test -Dtestcontainers.enabled=false

  # ── Stage 2: Frontend Validation ────────────────────────
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './gorentals-frontend/package-lock.json'

      - name: Install dependencies
        working-directory: ./gorentals-frontend
        run: npm install --legacy-peer-deps

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: ./gorentals-frontend/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: TypeScript check
        working-directory: ./gorentals-frontend
        run: npx tsc --noEmit

      - name: Build frontend
        working-directory: ./gorentals-frontend
        run: npm run build
        env:
          # Use placeholder for build-time validation if secret is missing in CI
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:8080/api' }}

  # ── Stage 3: Docker Build Verification ───────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./GORENTALS
          push: false
          tags: gorentals-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./gorentals-frontend
          push: false
          tags: gorentals-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Stage 4: Deploy to Render ───────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render Deploy (Backend)
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}

      - name: Trigger Render Deploy (Frontend)
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}
