spring:
  flyway:
    enabled: true
    locations: classpath:db/migration

# Disable ShedLock scheduler in tests — prevents background jobs
# from interfering with test assertions
gorentals:
  scheduling:
    enabled: false

# Use a no-op Razorpay configuration in tests —
# all Razorpay calls are mocked via @MockBean
razorpay:
  key-id: rzp_test_fake
  key-secret: fake_secret_32_chars_padding_xxxx
  webhook-secret: fake_webhook_secret
  account-number: "000000000000"

# JWT secret must satisfy HS256 minimum key-length (>= 256 bits).
# This value is ONLY used in the test profile — never deployed to production.
jwt:
  secret: test-only-secret-that-is-at-least-256-bits-long-for-hs256-algorithm-padding
  expiration: 86400000

logging:
  level:
    com.rentit: DEBUG
    org.flywaydb: INFO
