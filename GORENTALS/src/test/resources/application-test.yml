spring:
  flyway:
    enabled: false
  datasource:
    url: jdbc:h2:mem:test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: sa
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

gorentals:
  scheduling:
    enabled: false

razorpay:
  key-id: rzp_test_fake
  key-secret: fake_secret_32_chars_padding_xxxx
  webhook-secret: fake_webhook_secret
  account-number: "000000000000"

jwt:
  secret: test-only-secret-that-is-at-least-256-bits-long-for-hs256-algorithm-padding
  expiration: 86400000

logging:
  level:
    com.rentit: DEBUG
    org.flywaydb: WARN

rate-limiting:
  enabled: true
  global:
    requests: 1000
  auth:
    requests: 5
    duration-minutes: 15
  registration:
    requests: 5
  upload:
    requests: 50
