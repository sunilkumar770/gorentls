spring:
  application:
    name: rentit-platform

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gorentals}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: true
        format_sql: true
    show-sql: false

  flyway:
    enabled: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

razorpay:
  key:
    id: ${RAZORPAY_KEY:rzp_test_xxx}
    secret: ${RAZORPAY_SECRET:xxx}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:your-secret-key-change-in-production-min-32-characters-long}
    expiration: ${JWT_EXPIRATION:86400000}
  admin:
    email: ${APP_ADMIN_EMAIL:admin@gorentals.com}
    password: ${APP_ADMIN_PASSWORD:Admin@GoRentals2025!}
    name: ${APP_ADMIN_NAME:GoRentals Admin}

logging:
  level:
    com.rentit: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
