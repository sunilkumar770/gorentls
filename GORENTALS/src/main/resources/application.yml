spring:
  application:
    name: gorentals

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gorentals}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: GoRentalsHikariPool

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: false
    open-in-view: false
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
      hibernate.format_sql: false
      hibernate.jdbc.lob.non_contextual_creation: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    repair-on-migrate: true

  jackson:
    default-property-inclusion: NON_NULL
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    time-zone: UTC
  mail:
    host: localhost
    port: 25
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

razorpay:
  key-id: ${RAZORPAY_KEY_ID}
  key-secret: ${RAZORPAY_KEY_SECRET}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET}
  account-number: ${RAZORPAY_ACCOUNT_NUMBER:70070707070707}

app:
  admin:
    email: ${APP_ADMIN_EMAIL:admin@gorentals.com}
    password: ${APP_ADMIN_PASSWORD}
    name: ${APP_ADMIN_NAME:Admin User}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  api:
    server-url: ${APP_SERVER_URL:http://localhost:8080}
    version: ${APP_VERSION:1.0.0}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:demo}
  api-key: ${CLOUDINARY_API_KEY:demo}
  api-secret: ${CLOUDINARY_API_SECRET:demo}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

logging:
  level:
    root: WARN
    com.rentit: INFO
    com.rentit.service.PayoutEngine: INFO
    com.rentit.service.LedgerReconciliationService: INFO
    org.springframework.web: WARN
    org.springframework.messaging: WARN
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "{\"timestamp\":\"%d{yyyy-MM-dd'T'HH:mm:ss.SSS'Z'}\",\"level\":\"%level\",\"logger\":\"%logger{36}\",\"trace\":\"%X{traceId}\",\"span\":\"%X{spanId}\",\"message\":\"%replace(%msg){'\\\"','\\\\\"'}\"}%n"

server:
  port: ${PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
    filter: true
    displayRequestDuration: true
  show-actuator: false
  default-produces-media-type: application/json

gorentals:
  scheduling:
    enabled: ${SCHEDULING_ENABLED:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      roles: ADMIN
  info:
    env:
      enabled: true
