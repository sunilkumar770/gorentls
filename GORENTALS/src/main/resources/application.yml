# ──────────────────────────────────────────────────
# application.yml – Base / shared config (all profiles)
# Profile overrides: application-dev.yml / application-prod.yml
# NEVER put secrets or real passwords here.
# ──────────────────────────────────────────────────
spring:
  application:
    name: gorentals

  # ── DataSource (overridden per profile) ──
  datasource:
    url: ${DB_URL:}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: GoRentalsHikariPool

  # ── JPA ──
  jpa:
    hibernate:
      # SAFE DEFAULT: 'validate' prevents accidental schema changes.
      # Dev profile overrides to 'update' for convenience.
      # Prod profile also uses 'validate'; Flyway manages schema.
      ddl-auto: ${DDL_AUTO:validate}
    # SECURITY: Never log SQL in production (override in dev profile only)
    show-sql: false
    open-in-view: false
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
      hibernate.format_sql: false
      hibernate.jdbc.lob.non_contextual_creation: true

  # ── Flyway ──
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: true

  # ── Redis ──
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      repositories:
        enabled: false

  # ── Mail ──
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true

# ── JWT ──
jwt:
  secret: ${JWT_SECRET:}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

# ── CORS ──
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}
  allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
  allowed-headers: '*'
  expose-headers: Authorization,X-Total-Count,X-Page,X-PageSize
  allow-credentials: true
  max-age: 3600

# ── App URLs ──
app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  server-url: ${APP_SERVER_URL:http://localhost:8080}
  redis:
    enabled: ${REDIS_ENABLED:false}
  # Admin bootstrap credentials (required; set via env var, never hardcode)
  admin:
    email: ${APP_ADMIN_EMAIL:}
    password: ${APP_ADMIN_PASSWORD:}

# ── Actuator ──
management:
  health:
    redis:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

# ── Rate Limiting ──
# NOTE: Current implementation uses in-memory buckets (ConcurrentHashMap).
# For multi-instance / horizontal scaling, switch to Redis-backed Bucket4j
# by adding bucket4j-redis dependency and replacing the ConcurrentHashMap
# with a ProxyManager backed by Redis (see RateLimitingFilter.java).
rate-limiting:
  enabled: true
  global:
    requests: 1000
  auth:
    requests: 5
    duration-minutes: 15
  registration:
    requests: 5
  upload:
    requests: 50

# ── Server error response hardening ──
server:
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false
