spring:
  application:
    name: rentit-platform

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/rentit}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # PRODUCTION: 'validate' — Hibernate checks schema matches entities, never modifies it.
      # Flyway owns all CREATE/ALTER statements.
      ddl-auto: ${DDL_AUTO:validate}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: true
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# ─── Error Config ──────────────────────────────────────────────────────────────
server:
  error:
    include-message: on_param
    include-exception: false
    include-stacktrace: never

# ─── Razorpay ──────────────────────────────────────────────────────────────────
razorpay:
  key: ${RAZORPAY_KEY:rzp_test_xxx}
  secret: ${RAZORPAY_SECRET:xxx}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}

# ─── JWT ───────────────────────────────────────────────────────────────────────
# SECURITY: JWT_SECRET must be set as an environment variable.
# No insecure fallback — startup will fail with a clear error if not set.
# Generate with: [System.Convert]::ToBase64String((1..48 | % { [byte](Get-Random -Max 256) }))
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

# ─── App ───────────────────────────────────────────────────────────────────────
app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  admin:
    email: ${APP_ADMIN_EMAIL:admin@gorentals.com}
    password: ${APP_ADMIN_PASSWORD:Admin@GoRentals2025!}
    name: ${APP_ADMIN_NAME:GoRentals Admin}
  platform:
    commission-rate: ${COMMISSION_RATE:0.10}

# ─── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    com.rentit: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    org.flywaydb: INFO
