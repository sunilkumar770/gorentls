spring:
  application:
    name: gorentals

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gorentals}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10          # safe for free-tier Neon/Render (max 20 on paid)
      minimum-idle: 2
      connection-timeout: 30000      # 30s — fail fast rather than hang under load
      idle-timeout: 600000           # 10m — release unused connections
      max-lifetime: 1800000          # 30m — rotate before DB kills them
      pool-name: GoRentalsHikariPool

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}   # override to "validate" in production
    show-sql: false                  # never true in prod — leaks schema + data
    open-in-view: false
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
      hibernate.format_sql: false
      hibernate.jdbc.lob.non_contextual_creation: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  flyway:
    enabled: false

  jackson:
    serialization:
      write-dates-as-timestamps: false

razorpay:
  key-id: ${RAZORPAY_KEY:rzp_test_xxx}
  key-secret: ${RAZORPAY_SECRET:xxx}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:whsec_xxx}
  account-number: ${RAZORPAY_ACCOUNT_NUMBER:XXXXXXXXXXXX}

app:
  admin:
    email: ${APP_ADMIN_EMAIL:admin@gorentals.com}
    password: ${APP_ADMIN_PASSWORD:Admin@GoRentals2025!}
    name: ${APP_ADMIN_NAME:GoRentals Admin}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

# JWT — all values from environment, no fallback in prod
jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

# Cloudinary — image uploads
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:demo}
  api-key: ${CLOUDINARY_API_KEY:demo}
  api-secret: ${CLOUDINARY_API_SECRET:demo}

# CORS origins — comma-separated list from environment
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

# Logging — production levels
logging:
  level:
    root: WARN
    com.rentit: INFO                 # your own code stays INFO
    org.springframework.web: WARN
    org.springframework.messaging: WARN   # silences WS handshake noise
    org.springframework.security: WARN
    org.hibernate.SQL: WARN         # change to DEBUG only for local troubleshooting
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

server:
  port: ${PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true           # allow test calls from Swagger UI
    filter: true                    # search box in Swagger UI
    displayRequestDuration: true
  show-actuator: false              # keep actuator out of public API docs
  default-produces-media-type: application/json

# App metadata (injected into OpenAPI info)
app:
  api:
    server-url: ${APP_SERVER_URL:http://localhost:8080}
    version: ${APP_VERSION:1.0.0}

# Scheduling — disable in test profile via application-test.yml
gorentals:
  scheduling:
    enabled: ${SCHEDULING_ENABLED:true}

# Actuator — expose only health and info publicly; all others require ADMIN
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      roles: ADMIN
  info:
    env:
      enabled: true

# Jackson — consistent serialization
spring:
  jackson:
    default-property-inclusion: NON_NULL
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    time-zone: UTC
