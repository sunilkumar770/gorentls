# ─── Error Config — never expose internals to clients ────────────────────────
server.error.include-message=on_param
server.error.include-exception=false
server.error.include-stacktrace=never

# ─── JWT — required by JwtUtil.java (no defaults in code) ────────────────────
jwt.secret=${JWT_SECRET:GoRentalsSecretKey2025SuperSecureHardcodedForDev}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ─── Admin seed credentials (used by DataInitializer.java at startup) ─────────
app.admin.email=${APP_ADMIN_EMAIL:admin@gorentals.com}
app.admin.password=${APP_ADMIN_PASSWORD:Admin@GoRentals2025!}
app.admin.name=${APP_ADMIN_NAME:GoRentals Admin}

# ─── CORS ─────────────────────────────────────────────────────────────────────
app.frontend-url=${FRONTEND_URL:http://localhost:3000}
