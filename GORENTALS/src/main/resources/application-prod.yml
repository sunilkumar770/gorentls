cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://rentit.vercel.app}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: Authorization,Content-Type,X-Requested-With
  allow-credentials: true

server:
  # Disable server fingerprinting headers for security
  server-header: ""

spring:
  jpa:
    hibernate:
      ddl-auto: validate
