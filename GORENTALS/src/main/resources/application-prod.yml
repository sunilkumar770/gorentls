# ── PRODUCTION profile ────────────────────────────────────────────────────────
# All sensitive values MUST come from environment variables.
# No defaults for secrets — application will fail to start if any are missing.
# Set these in your deployment environment (Railway / Render / EC2 / ECS).

spring:
  datasource:
    url:      ${DB_URL}             # jdbc:postgresql://host:5432/gorentals
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    out-of-order: false            # strict migration order in production

  jpa:
    show-sql: false                # NEVER log SQL in production
    open-in-view: false
    hibernate:
      ddl-auto: validate           # Flyway owns the schema; Hibernate only validates

# JWT
app:
  jwt:
    secret:     ${JWT_SECRET}      # min 512-bit random string
    expiration: ${JWT_EXPIRATION_MS:86400000}  # 24h default
  api:
    server-url: ${APP_SERVER_URL}
    version:    ${APP_VERSION:1.0.0}

# Razorpay
razorpay:
  key-id:         ${RAZORPAY_KEY_ID}
  key-secret:     ${RAZORPAY_KEY_SECRET}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET}
  account-number: ${RAZORPAY_ACCOUNT_NUMBER}   # RazorpayX current account

# Cloudinary (listing image uploads)
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key:    ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

# Logging — structured JSON for log aggregation (Datadog / CloudWatch)
logging:
  pattern:
    console: >
      {"timestamp":"%d{yyyy-MM-dd'T'HH:mm:ss.SSS'Z'}","level":"%level",
       "logger":"%logger{36}","message":"%msg","trace":"%X{traceId}"}%n
  level:
    root:          WARN
    com.rentit:    INFO
    org.flywaydb:  INFO
    # NEVER set com.rentit to DEBUG in production — leaks PII

# Scheduling
gorentals:
  scheduling:
    enabled: true

# SpringDoc — disable Swagger UI in production (API is internal)
springdoc:
  swagger-ui:
    enabled: ${SWAGGER_UI_ENABLED:false}    # set to true only on staging
  api-docs:
    enabled: ${API_DOCS_ENABLED:false}      # set to true only on staging

# Server
server:
  port: ${PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html
    min-response-size: 1024
  http2:
    enabled: true
  error:
    include-message: never         # no stack traces in error responses
    include-stacktrace: never
    include-binding-errors: never
